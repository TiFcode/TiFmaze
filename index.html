<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFmaze — Labirint / Maze Runner</title>
<meta property="og:title" content="TiFmaze">
<meta property="og:description" content="Labirint / Maze Runner">
<meta property="og:image" content="https://tifcode.github.io/TiFmaze/tifmaze_og.png">
<meta property="og:type" content="website">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fredoka','Comic Sans MS',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;user-select:none;-webkit-user-select:none;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.header{text-align:center;padding:12px 10px 4px}
.header h1{font-size:30px;background:linear-gradient(135deg,#43e97b,#38f9d7,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(2px 2px 4px rgba(0,0,0,.5))}
.header .subtitle{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}
.stats{display:flex;justify-content:center;gap:20px;padding:6px;font-size:16px;font-weight:600}
.stats .level-label{color:#43e97b}.stats .moves{color:#f093fb}.stats .timer{color:#5dade2}.stats .stars{color:#ffd200}
.level-bar{display:flex;justify-content:center;gap:6px;padding:6px;flex-wrap:wrap}
.level-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);color:#fff;padding:5px 14px;border-radius:20px;font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.level-btn:hover{background:rgba(255,255,255,.2)}
.level-btn.active{background:linear-gradient(135deg,#43e97b,#38f9d7);border-color:transparent;transform:scale(1.05);color:#0f0c29}
.level-btn.completed::after{content:'⭐';margin-left:4px}
#game-container{position:relative;touch-action:none}
canvas{display:block;border-radius:12px;box-shadow:0 0 30px rgba(67,233,123,.3)}
.win-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;gap:16px}
.win-overlay.show{display:flex}
.win-box{background:linear-gradient(135deg,#302b63,#24243e);border:3px solid #43e97b;border-radius:20px;padding:30px 40px;text-align:center;animation:popIn .4s ease}
.win-box h2{font-size:28px;color:#43e97b;margin-bottom:8px}
.win-box .win-stars{font-size:40px;margin:10px 0}
.win-box .win-stats{font-size:16px;color:rgba(255,255,255,.8);margin:6px 0}
.win-box button{margin-top:14px;padding:10px 28px;font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;border:none;border-radius:14px;cursor:pointer;transition:transform .15s}
.btn-next{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#0f0c29;margin-left:8px}
.btn-retry{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3)!important}
.btn-next:hover,.btn-retry:hover{transform:scale(1.06)}
.controls{display:flex;gap:6px;padding:6px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{width:52px;height:52px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:active{background:rgba(67,233,123,.3);transform:scale(.92)}
.d-pad{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px 52px;gap:4px;justify-content:center}
.d-pad .empty{visibility:hidden}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sparkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.legend{display:flex;gap:14px;justify-content:center;padding:4px;font-size:13px;color:rgba(255,255,255,.6)}
.legend span{display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="header">
  <h1>🌿 TiFmaze</h1>
  <div class="subtitle">Labirint / Maze Runner</div>
</div>
<div class="stats">
  <span class="level-label" id="lvl-label">Nivel 1</span>
  <span class="moves" id="move-count">👣 0</span>
  <span class="timer" id="timer">⏱ 0s</span>
  <span class="stars" id="best-stars"></span>
</div>
<div class="level-bar" id="level-bar"></div>
<div class="legend">
  <span id="legend-player">🐸 Tu/You</span>
  <span>⭐ Ieșire/Exit</span>
  <span>💎 Bonus</span>
</div>
<div id="game-container">
  <canvas id="maze"></canvas>
</div>
<div class="d-pad" id="dpad">
  <div class="empty"></div>
  <button class="ctrl-btn" data-dir="up">⬆️</button>
  <div class="empty"></div>
  <button class="ctrl-btn" data-dir="left">⬅️</button>
  <button class="ctrl-btn" data-dir="down">⬇️</button>
  <button class="ctrl-btn" data-dir="right">➡️</button>
</div>
<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <h2 id="win-title">🎉 Bravo!</h2>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-stats" id="win-stats"></div>
    <div>
      <button class="btn-retry" onclick="restartLevel()">🔄 Retry</button>
      <button class="btn-next" id="btn-next" onclick="nextLevel()">Următorul ➡️</button>
    </div>
  </div>
</div>
<script>
const LEVELS = [
  {name:"Grădina / Garden",w:7,h:7,gems:1,emoji:"🌻",wall:"🌳"},
  {name:"Peștera / Cave",w:9,h:7,gems:1,emoji:"🦇",wall:"🪨"},
  {name:"Plaja / Beach",w:9,h:9,gems:2,emoji:"🐚",wall:"🌊"},
  {name:"Castelul / Castle",w:11,h:9,gems:2,emoji:"🏰",wall:"🧱"},
  {name:"Spațiul / Space",w:11,h:11,gems:2,emoji:"🚀",wall:"🌑"},
  {name:"Jungla / Jungle",w:13,h:11,gems:3,emoji:"🐒",wall:"🌴"},
  {name:"Vulcanul / Volcano",w:13,h:13,gems:3,emoji:"🌋",wall:"🔥"},
  {name:"Oceanul / Ocean",w:15,h:13,gems:3,emoji:"🐙",wall:"🫧"},
  {name:"Norul / Cloud",w:15,h:15,gems:4,emoji:"☁️",wall:"⚡"},
  {name:"Dragonul / Dragon",w:17,h:15,gems:4,emoji:"🐉",wall:"👑"},
];

let currentLevel=0, maze=[], playerX=0, playerY=0, moves=0, timerVal=0, timerInterval=null;
let gems=[], gemsCollected=0, totalGems=0, goalX=0, goalY=0, won=false;
let bestStars=JSON.parse(localStorage.getItem('tifmaze-stars')||'{}');
const canvas=document.getElementById('maze'), ctx=canvas.getContext('2d');

function initLevelBar(){
  const bar=document.getElementById('level-bar');
  bar.innerHTML='';
  LEVELS.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='level-btn'+(i===currentLevel?' active':'')+(bestStars[i]?' completed':'');
    b.textContent=(i+1);
    b.title=l.name;
    b.onclick=()=>{currentLevel=i;startLevel()};
    bar.appendChild(b);
  });
}

function generateMaze(w,h){
  // All walls initially
  const grid=Array.from({length:h},()=>Array(w).fill(1));
  // Recursive backtracker on odd cells
  const dirs=[[0,-2],[0,2],[-2,0],[2,0]];
  function carve(x,y){
    grid[y][x]=0;
    const sh=[...dirs].sort(()=>Math.random()-.5);
    for(const[dx,dy]of sh){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<w-1&&ny>0&&ny<h-1&&grid[ny][nx]===1){
        grid[y+dy/2][x+dx/2]=0;
        carve(nx,ny);
      }
    }
  }
  carve(1,1);
  return grid;
}

function floodReachable(grid,sx,sy,bx,by,w,h){
  const visited=new Set();
  const q=[[sx,sy]];
  visited.add(sy+','+sx);
  while(q.length){
    const[cx,cy]=q.shift();
    for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){
      const nx=cx+dx,ny=cy+dy;
      const k=ny+','+nx;
      if(nx>=0&&nx<w&&ny>=0&&ny<h&&!visited.has(k)&&grid[ny][nx]===0&&!(nx===bx&&ny===by)){
        visited.add(k);q.push([nx,ny]);
      }
    }
  }
  return visited;
}

function placeGems(grid,count,w,h){
  // Only place gems on cells reachable from start WITHOUT passing through exit
  const reachable=floodReachable(grid,1,1,w-2,h-2,w,h);
  const spots=[];
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(grid[y][x]===0&&!(x===1&&y===1)&&reachable.has(y+','+x))spots.push([x,y]);
  }
  spots.sort(()=>Math.random()-.5);
  return spots.slice(0,Math.min(count,spots.length));
}

function startLevel(){
  const lv=LEVELS[currentLevel];
  won=false;
  moves=0;timerVal=0;gemsCollected=0;
  if(timerInterval)clearInterval(timerInterval);
  maze=generateMaze(lv.w,lv.h);
  playerX=1;playerY=1;
  goalX=lv.w-2;goalY=lv.h-2;
  maze[goalY][goalX]=0;// ensure exit is open
  totalGems=lv.gems;
  gems=placeGems(maze,lv.gems,lv.w,lv.h);
  
  // Size canvas
  const maxW=Math.min(window.innerWidth-20,500);
  const maxH=Math.min(window.innerHeight-260,500);
  const cellW=Math.floor(maxW/lv.w);
  const cellH=Math.floor(maxH/lv.h);
  const cell=Math.max(20,Math.min(cellW,cellH));
  canvas.width=lv.w*cell;
  canvas.height=lv.h*cell;
  canvas._cell=cell;

  draw();
  updateUI();
  initLevelBar();
  document.getElementById('win-overlay').classList.remove('show');
  
  timerInterval=setInterval(()=>{timerVal++;document.getElementById('timer').textContent='⏱ '+timerVal+'s'},1000);
}

function draw(){
  const lv=LEVELS[currentLevel];
  const cell=canvas._cell;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // Background
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  const fontSize=Math.max(12,cell-4);
  ctx.font=fontSize+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  
  for(let y=0;y<lv.h;y++)for(let x=0;x<lv.w;x++){
    const px=x*cell,py=y*cell;
    if(maze[y][x]===1){
      ctx.fillStyle='#2d2d5e';
      ctx.fillRect(px,py,cell,cell);
      ctx.fillText(lv.wall,px+cell/2,py+cell/2);
    } else {
      ctx.fillStyle='#0d0d1a';
      ctx.fillRect(px,py,cell,cell);
    }
  }
  
  // Grid lines (subtle)
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  for(let y=0;y<=lv.h;y++){ctx.beginPath();ctx.moveTo(0,y*cell);ctx.lineTo(canvas.width,y*cell);ctx.stroke()}
  for(let x=0;x<=lv.w;x++){ctx.beginPath();ctx.moveTo(x*cell,0);ctx.lineTo(x*cell,canvas.height);ctx.stroke()}
  
  // Gems
  gems.forEach(([gx,gy])=>{
    ctx.font=(fontSize+2)+'px serif';
    ctx.fillText('💎',gx*cell+cell/2,gy*cell+cell/2);
  });
  
  // Goal
  ctx.font=(fontSize+4)+'px serif';
  ctx.fillText('⭐',goalX*cell+cell/2,goalY*cell+cell/2);
  
  // Trail (subtle)
  
  // Player
  ctx.font=(fontSize+4)+'px serif';
  ctx.fillText('🐸',playerX*cell+cell/2,playerY*cell+cell/2);
}

function movePlayer(dx,dy){
  if(won)return;
  const nx=playerX+dx,ny=playerY+dy;
  const lv=LEVELS[currentLevel];
  if(nx<0||nx>=lv.w||ny<0||ny>=lv.h)return;
  if(maze[ny][nx]===1)return;
  playerX=nx;playerY=ny;
  moves++;
  
  // Check gem collection
  gems=gems.filter(([gx,gy])=>{
    if(gx===nx&&gy===ny){gemsCollected++;return false}
    return true;
  });
  
  // Check win
  if(nx===goalX&&ny===goalY){
    winLevel();
  }
  
  draw();
  updateUI();
}

function updateUI(){
  document.getElementById('move-count').textContent='👣 '+moves;
  document.getElementById('lvl-label').textContent=LEVELS[currentLevel].name;
  const bs=bestStars[currentLevel];
  document.getElementById('best-stars').textContent=bs?'🏆'+('⭐'.repeat(bs)):'';
  document.getElementById('legend-player').textContent='🐸 Tu/You';
}

function winLevel(){
  won=true;
  clearInterval(timerInterval);
  
  const lv=LEVELS[currentLevel];
  const optimalMoves=(lv.w+lv.h)*1.2;
  let stars=1;
  if(moves<=optimalMoves*2&&gemsCollected===totalGems)stars=3;
  else if(moves<=optimalMoves*3||gemsCollected>=totalGems/2)stars=2;
  
  if(!bestStars[currentLevel]||stars>bestStars[currentLevel]){
    bestStars[currentLevel]=stars;
    localStorage.setItem('tifmaze-stars',JSON.stringify(bestStars));
  }
  
  document.getElementById('win-stars').textContent='⭐'.repeat(stars)+('☆'.repeat(3-stars));
  document.getElementById('win-stats').innerHTML=
    `👣 ${moves} pași/steps · ⏱ ${timerVal}s · 💎 ${gemsCollected}/${totalGems}`;
  document.getElementById('win-title').textContent=
    stars===3?'🎉 Perfect!':stars===2?'👏 Foarte bine!':'✅ Ai reușit!';
  document.getElementById('btn-next').style.display=currentLevel<LEVELS.length-1?'':'none';
  document.getElementById('win-overlay').classList.add('show');
  
  // Confetti
  spawnConfetti();
}

function restartLevel(){
  document.getElementById('win-overlay').classList.remove('show');
  startLevel();
}
function nextLevel(){
  if(currentLevel<LEVELS.length-1){currentLevel++;startLevel()}
}

// Confetti
function spawnConfetti(){
  const emojis=['🎉','🌟','✨','🎊','💫','🐸'];
  for(let i=0;i<20;i++){
    const el=document.createElement('div');
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText=`position:fixed;font-size:${20+Math.random()*20}px;left:${Math.random()*100}vw;top:-30px;z-index:200;pointer-events:none;animation:confettiFall ${2+Math.random()*2}s ease-in forwards;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
  if(!document.getElementById('confetti-style')){
    const s=document.createElement('style');s.id='confetti-style';
    s.textContent='@keyframes confettiFall{to{top:110vh;transform:rotate('+Math.random()*720+'deg)}}';
    document.head.appendChild(s);
  }
}

// Keyboard
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=map[e.key];
  if(d){e.preventDefault();movePlayer(...d)}
});

// D-pad buttons
document.querySelectorAll('[data-dir]').forEach(btn=>{
  const map={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  btn.addEventListener('click',()=>movePlayer(...map[btn.dataset.dir]));
  btn.addEventListener('touchstart',e=>{e.preventDefault();movePlayer(...map[btn.dataset.dir])});
});

// Touch swipe on canvas disabled — use d-pad arrows only

// Resize
window.addEventListener('resize',()=>{if(!won)startLevel()});

// Init
startLevel();
</script>
</body>
</html>
